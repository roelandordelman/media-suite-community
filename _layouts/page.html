---
layout: default
---

<div class="hero-strip">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        <h1 class="hero-strip-title">{{ page.title }}</h1>
        {%- if page.subtitle -%}
          <p class="hero-strip-subtitle">{{ page.subtitle }}</p>
        {%- endif -%}
      </div>
    </div>
  </div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      {{ content }}
    </div>
  </div>
</div>
